# git-cliff configuration for Meterplex
# Enforces Conventional Commits and generates automated changelogs.

[changelog]
# changelog header
header = """
# Changelog\n
All notable changes to Meterplex API.\n
"""
# template for the changelog body
# https://keats.github.io/tera/docs/#introduction
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}

{% else %}\
## [Unreleased]

{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }} (by @{{ commit.author.name }})\
{% endfor %}
{% endfor %}\n
"""
# remove the leading and trailing whitespace from the template
trim = true
# changelog footer
footer = ""

[git]
# parse the commits based on https://www.conventionalcommits.org
conventional_commits = true
# filter out the commits that are not conventional
filter_unconventional = false
# process each line of a commit as an individual commit
split_commits = false
# skip merge commits
skip_merge = true
# regex for preprocessing the commit messages
commit_preprocessors = [
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/chitrank2050/meterplex/issues/${2}))"}, # replace issue numbers
]
# regex for parsing and grouping commits
commit_parsers = [
  { message = "^docs: update changelog", skip = true },
  { message = "^chore: release", skip = true },
  { message = "^chore: bump", skip = true },
  { message = "^chore\\(release\\): update CHANGELOG.md", skip = true },
  { message = "Update CHANGELOG.md", skip = true },
  { message = "^Merge branch", skip = true },
  { message = "^Merge pull request", skip = true },
  { message = "^Merge", skip = true },
  { message = "^feat", group = "🚀 Features" },
  { message = "^fix", group = "🐛 Bug Fixes" },
  { message = "^doc", group = "📚 Documentation" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^refactor", group = "🚜 Refactoring" },
  { message = "^style", group = "🎨 Styling" },
  { message = "^test", group = "🧪 Testing" },
  { message = "^chore", group = "⚙️ Maintenance" },
  { message = "^ci", group = "👷 Continuous Integration" },
  { message = "^build", group = "🏗️ Build" },
  { message = "^revert", group = "◀️ Revert" },
  { message = ".*", group = "⚙️ Miscellaneous Tasks" },
]
# protect breaking changes from being skipped due to matching a skipping commit_parser
protect_breaking_commits = true
# filter out the commits that are not matched by commit_parsers
filter_commits = true
# glob pattern for matching git tags
tag_pattern = "v[0-9]*"
# sort the tags topologically
topo_order = false
# sort the commits inside sections by message
sort_commits = "oldest"

[remote.github]
owner = "chitrank2050"
repo = "meterplex"
