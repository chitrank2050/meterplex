# git-cliff configuration for Meterplex (Backend Focused)
# Enforces Conventional Commits and generates automated changelogs.
# Docs: https://git-cliff.org/docs/configuration

[changelog]
# changelog header
header = """
# Changelog\n
All notable changes to the Meterplex API and core platform.\n
"""
# template for the changelog body
# https://keats.github.io/tera/docs/#introduction
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}\
    ### {{ group | striptags | trim | upper_first }}\
    {% for commit in commits %}\
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | trim | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}]({{ commit.id }})) by {% set user = commit.remote.username | default(value=commit.author.name) %}{% if user is ending_with("[bot]") %}[{{ user }}](https://github.com/apps/{{ user | split(pat="[") | first }}){% else %}@{{ user }}{% endif %}\
    {% endfor %}
{% endfor %}\n
"""
# remove the leading and trailing whitespace from the template
trim = true
# changelog footer
footer = """
<!-- generated by git-cliff -->
"""

[git]
# parse the commits based on https://www.conventionalcommits.org
conventional_commits = true
# filter out the commits that are not conventional
filter_unconventional = false
# process each line of a commit as an individual commit
split_commits = false
# skip merge commits
skip_merge = true
# regex for preprocessing the commit messages
commit_preprocessors = [
  # Replace issue numbers with links, preserving the prefix (e.g., "fixes #123" -> "([#123](...))")
  { pattern = '(?i)\((?:fixes?|closes?|resolves?|#)\s?#([0-9]+)\)', replace = "([#${1}](https://github.com/chitrank2050/meterplex/issues/${1}))" },
  # Clean up any trailing squash-merge noise if it wasn't caught (e.g., "(#123)" at the end)
  { pattern = '\s\(#([0-9]+)\)$', replace = " [#${1}](https://github.com/chitrank2050/meterplex/issues/${1})" },
  # Ensure only one space between message and links
  { pattern = '\s+', replace = " " },
]
# regex for parsing and grouping commits
commit_parsers = [
  # Skip release and maintenance chores
  { message = "^docs: update changelog", skip = true },
  { message = "^chore: release", skip = true },
  { message = "^chore: bump", skip = true },
  { message = "^chore\\(release\\): update CHANGELOG.md", skip = true },
  { message = "^chore\\(deps.*\\)", skip = true },
  { message = "^chore\\(pr\\)", skip = true },
  { message = "^chore\\(pull\\)", skip = true },
  { message = "Update CHANGELOG.md", skip = true },
  { message = "^Merge", skip = true },
  # Backend Specific Grouping
  { message = "^feat", group = "<!-- 0 -->🚀 Features" },
  { message = "^fix", group = "<!-- 1 -->🐛 Bug Fixes" },
  { body = ".*security|.*auth|.*jwt", group = "<!-- 2 -->🛡️ Security & Auth" },
  { message = ".*(db|prisma|schema|migration).*", group = "<!-- 3 -->💾 Database & Schema" },
  { message = ".*(api|endpoint|kafka|event|grpc|rest).*", group = "<!-- 4 -->📡 API & Communication" },
  { message = "^perf", group = "<!-- 5 -->⚡ Performance" },
  { message = "^refactor", group = "<!-- 6 -->🚜 Refactoring" },
  { message = "^doc", group = "<!-- 7 -->📚 Documentation" },
  { message = "^style", group = "<!-- 8 -->🎨 Styling" },
  { message = "^test", group = "<!-- 9 -->🧪 Testing" },
  { message = "^build|^chore\\(docker\\)|^chore\\(k8s\\)", group = "<!-- 10 -->🏗️ Infrastructure" },
  { message = "^ci", group = "<!-- 11 -->👷 CI/CD" },
  { message = "^revert", group = "<!-- 12 -->◀️ Revert" },
  { message = "^chore", group = "<!-- 13 -->⚙️ Maintenance" },
  { message = ".*", group = "<!-- 14 -->⚙️ Miscellaneous Tasks" },
]
# protect breaking changes from being skipped due to matching a skipping commit_parser
protect_breaking_commits = true
# filter out the commits that are not matched by commit_parsers
filter_commits = true
# glob pattern for matching git tags
tag_pattern = "v?[0-9].*"
# regex for skipping tags
skip_tags = ""
# regex for ignoring tags
ignore_tags = ""
# sort the tags topologically
topo_order = false
# sort the commits inside sections by message
sort_commits = "oldest"

[remote.github]
owner = "chitrank2050"
repo = "meterplex"
