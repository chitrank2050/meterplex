# git-cliff configuration for Meterplex (Project 2027 Standard)
# Enforces high-signal, architectural changelogs with prioritized domain grouping.
# Docs: https://git-cliff.org/docs/configuration

[changelog]
# changelog header
header = """
# Changelog\n
All notable changes to the Meterplex platform.\n
"""
# template for the changelog body
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\

{% if commits | filter(attribute="breaking", value=true) | length > 0 %}
### ⚠️ BREAKING CHANGES
{% for commit in commits | filter(attribute="breaking", value=true) %}
- **{{ commit.scope | default(value="global") }}:** {{ commit.breaking_description | upper_first }}
{% endfor %}
{% endif %}\

{% for group, commits in commits | group_by(attribute="group") %}\
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
            {{ commit.message | split(pat="\n") | first | trim | upper_first }}\
            {% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}]({{ commit.remote.pr_url }})){% endif %} \
            ([{{ commit.id | truncate(length=7, end="") }}]({{ commit.id }})) by {% set user = commit.remote.username | default(value=commit.author.name) %}{% if user is ending_with("[bot]") %}[{{ user }}](https://github.com/apps/{{ user | split(pat="[") | first }}){% else %}@{{ user }}{% endif %}
    {% endfor %}
{% endfor %}\n
"""
# remove the leading and trailing whitespace from the template
trim = true
# changelog footer
footer = """
<!-- generated by git-cliff -->
"""

[git]
# parse the commits based on https://www.conventionalcommits.org
conventional_commits = true
# filter out the commits that are not conventional
filter_unconventional = true
# process each line of a commit as an individual commit
split_commits = false
# skip merge commits
skip_merge = true
# regex for preprocessing the commit messages
commit_preprocessors = [
  # Replace issue numbers with links
  { pattern = '(?i)\((?:fixes?|closes?|resolves?|#)\s?#([0-9]+)\)', replace = "([#${1}](https://github.com/chitrank2050/meterplex/issues/${1}))" },
  # Clean up any trailing squash-merge noise
  { pattern = '\s\(#([0-9]+)\)$', replace = "" },
]
# regex for parsing and grouping commits
commit_parsers = [
  # Skip release and maintenance noise
  { message = "^docs: update changelog", skip = true },
  { message = "^chore: release", skip = true },
  { message = "^chore: bump", skip = true },
  { message = "^chore\\(release\\): update CHANGELOG.md", skip = true },
  { message = "^chore\\(deps.*\\)", skip = true },
  { message = "Update CHANGELOG.md", skip = true },
  { message = "^Merge", skip = true },
  
  # Domain-Specific Grouping (Architecture First)
  { message = "(?i).*(security|auth|jwt).*", group = "<!-- 0 -->🛡️ Security & Auth" },
  { message = "(?i).*(db|prisma|schema|migration).*", group = "<!-- 1 -->💾 Database & Schema" },
  { message = "(?i).*(api|endpoint|kafka|event|grpc|rest).*", group = "<!-- 2 -->📡 API & Communication" },

  # Type-Based Grouping (Product & Engineering)
  { message = "^feat", group = "<!-- 3 -->🚀 Features" },
  { message = "^fix", group = "<!-- 4 -->🐛 Bug Fixes" },
  { message = "^perf", group = "<!-- 5 -->⚡ Performance" },
  { message = "^refactor", group = "<!-- 6 -->🚜 Refactoring" },
  { message = "^doc", group = "<!-- 7 -->📚 Documentation" },
  { message = "^test", group = "<!-- 8 -->🧪 Testing" },
  { message = "^ci|^build|^chore\\(docker\\)|^chore\\(k8s\\)", group = "<!-- 9 -->👷 CI/CD & Infra" },
  { message = "^chore|^style", group = "<!-- 10 -->⚙️ Maintenance" },
  { message = "^revert", group = "<!-- 11 -->◀️ Revert" },
  { message = ".*", group = "<!-- 12 -->⚙️ Miscellaneous Tasks" },
]
# protect breaking changes from being skipped
protect_breaking_commits = true
# filter out the commits that are not matched by commit_parsers
filter_commits = true
# glob pattern for matching git tags
tag_pattern = "v?[0-9].*"
# sort the commits inside sections by message
sort_commits = "oldest"

[remote.github]
owner = "chitrank2050"
repo = "meterplex"
