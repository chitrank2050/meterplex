# git-cliff configuration for Meterplex
# Enforces Conventional Commits and generates automated changelogs.

[changelog]
# changelog header
header = """
# Changelog\n
All notable changes to the Meterplex API and core platform.\n
"""
# template for the changelog body
# https://keats.github.io/tera/docs/#introduction
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | trim | upper_first }} ([{{ commit.id | truncate(length=7, end="") }}](https://github.com/chitrank2050/meterplex/commit/{{ commit.id }}))\
{% set user = commit.remote.username | default(value=commit.author.name) %}\
{% if user != "chitrank2050" %} by {% if user is ending_with("[bot]") %}[{{ user }}](https://github.com/apps/{{ user | split(pat="[") | first }}){% else %}[@{{ user }}](https://github.com/{{ user }}){% endif %}{% endif %}\
{% endfor %}
{% endfor %}\
{% if github.contributors | length > 0 %}
### 👥 Contributors
{% for contributor in github.contributors %}
- [@{{ contributor.username }}](https://github.com/{{ contributor.username }})
{%- endfor %}
{% endif %}\
"""
# remove the leading and trailing whitespace from the template
trim = true
# changelog footer
footer = ""

[git]
# parse the commits based on https://www.conventionalcommits.org
conventional_commits = true
# filter out the commits that are not conventional
filter_unconventional = false
# process each line of a commit as an individual commit
split_commits = false
# skip merge commits
skip_merge = true
# regex for preprocessing the commit messages
commit_preprocessors = [
  # Replace issue numbers with links
  { pattern = '(?i)\((?:fixes?|closes?|resolves?|#)\s?#([0-9]+)\)', replace = "([#${1}](https://github.com/chitrank2050/meterplex/issues/${1}))" },
  # Clean up trailing squash-merge noise (e.g. "feat: something (#123)")
  { pattern = '\s\(#([0-9]+)\)$', replace = "" },
]
# regex for parsing and grouping commits
commit_parsers = [
  # Skip release and maintenance noise (including scoped versions)
  { message = "^docs: update changelog", skip = true },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps.*\\)", skip = true },
  { message = "^chore: release", skip = true },
  { message = "^chore: bump", skip = true },
  { message = "Update CHANGELOG.md", skip = true },
  { message = "^Merge", skip = true },

  # Product & Engineering Grouping
  { message = "^feat", group = "🚀 Features" },
  { message = "^fix", group = "🐛 Bug Fixes" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^refactor", group = "🚜 Refactoring" },
  { message = "^doc", group = "📚 Documentation" },
  { message = "^test", group = "🧪 Testing" },
  { message = "^ci|^build", group = "👷 CI/CD & Infra" },
  { message = "^chore|^style|^maintenance", group = "⚙️ Maintenance" },
  { message = "^renovate", group = "♻️ Dependency Updates" },
  { message = "^revert", group = "◀️ Revert" },
  { message = ".*", group = "⚙️ Miscellaneous Tasks" },
]
# protect breaking changes from being skipped due to matching a skipping commit_parser
protect_breaking_commits = true
# filter out the commits that are not matched by commit_parsers
filter_commits = true
# glob pattern for matching git tags
tag_pattern = "v?[0-9].*"
# sort the tags topologically
topo_order = false
# sort the commits inside sections by message
sort_commits = "oldest"

[remote.github]
owner = "chitrank2050"
repo = "meterplex"
