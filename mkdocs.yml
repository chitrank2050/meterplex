site_name: Ask Chitrank
site_description: RAG-powered AI assistant that answers questions about Chitrank using resume, portfolio, and Sanity CMS data.
site_author: Chitrank Agnihotri
site_url: https://chitrank2050.github.io/askchitrank
repo_url: https://github.com/chitrank2050/askchitrank
repo_name: chitrank2050/askchitrank
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true

nav:
  - Home: index.md
  - Concepts:
      - Overview: concepts/overview.md
      - ROI Improvements: concepts/roi_improvements.md
      - Safety Routing: concepts/safety_routing.md
  - Development:
      - Setup: development/setup.md
      - Database: development/database.md
      - Tech Stack: development/tech_stack.md
  - Architecture:
      - Overview: architecture/overview.md
  - Ingestion:
      - Overview: ingestion/overview.md
  - Retrieval:
      - Overview: retrieval/overview.md
  - Chat:
      - Overview: chat/overview.md
  - API:
      - Reference: api/overview.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chitrank2050
      name: GitHub
    - icon: fontawesome/solid/globe
      link: https://chitrankagnihotri.com/
      name: Portfolio
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/chitrank-agnihotri/
      name: LinkedIn

copyright: Copyright &copy; 2026 Chitrank Agnihotri
