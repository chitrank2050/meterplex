# =============================================================
# Meterplex - MkDocs Configuration
#
# Auto deploy:    Push to main → GitHub Actions handles it
# =============================================================

site_name: Meterplex Docs
site_description: B2B usage metering, entitlements, and billing platform
site_author: Chitrank Agnihotri
site_url: https://chitrank2050.github.io/meterplex
repo_url: https://github.com/chitrank2050/meterplex
repo_name: chitrank2050/meterplex
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture:
      - Overview: architecture/overview.md
  - Development:
      - Setup: development/setup.md
  - API:
      - Overview: api/overview.md
  - Build Phases:
      - Phase 0 - Project Setup: phases/phase-0.md
      - Phase 1 - Identity and Access: phases/phase-1.md
  - Changelog: changelog.md

docs_dir: docs

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/chitrank2050
      name: GitHub
    - icon: fontawesome/solid/globe
      link: https://chitrankagnihotri.com/
      name: Portfolio
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/chitrank-agnihotri/
      name: LinkedIn

copyright: Copyright &copy; 2026 Chitrank Agnihotri
