# =============================================================
# Smart Auto-Approval for Renovate
#
# Automatically approves Pull Requests from Renovate that meet
# our safety criteria (Patch/Minor updates).
#
# This satisfies GitHub's Branch Protection rules while
# maintaining high development velocity.
# =============================================================

name: Auto-Approve Renovate 🤖✅

on:
  # zizmor: ignore[dangerous-triggers]
  workflow_run:
    workflows:
      - 'CI & Security Analysis ⚡️'
    branches:
      - 'renovate/**'
    types:
      - completed

permissions:
  pull-requests: write # Required to post an approval review

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  auto-approve:
    name: Auto-Approve 🚦
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Identity & Success Guard 🛡️
        id: guard
        env:
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          # Pass the whole array as JSON to avoid linter errors with deep paths
          PR_JSON: ${{ toJSON(github.event.workflow_run.pull_requests) }}
          ACTOR_FALLBACK: ${{ github.event.workflow_run.actor.login }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          # 1. Check if the CI was successful OR skipped (skipped is fine if hygiene passed)
          if [ "$CONCLUSION" != "success" ] && [ "$CONCLUSION" != "skipped" ] && [ "$CONCLUSION" != "neutral" ]; then
            echo "CI did not succeed ($CONCLUSION). Skipping."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 2. Check if it was triggered by Renovate (be flexible with bot name)
          # Fallback to the workflow run actor if the PR array is empty
          ACTOR=$(echo "$PR_JSON" | jq -r '.[0].user.login // "'$ACTOR_FALLBACK'"')
          BRANCH=$(echo "$PR_JSON" | jq -r '.[0].head.ref // "'$HEAD_BRANCH'"')

          if [[ ! "$ACTOR" == *renovate* ]] || [[ ! "$BRANCH" == renovate/* ]]; then
            echo "Security Check Failed: Actor ($ACTOR) or Branch ($BRANCH) is not authorized for auto-approval."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # 3. Find the PR Number (Fallback to GH CLI if array is empty)
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            echo "PR array empty. Searching for PR associated with branch $BRANCH..."
            PR_NUMBER=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')
          fi

          if [ -z "$PR_NUMBER" ]; then
            echo "❌ Error: Could not find a PR for branch $BRANCH"
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_run=true" >> "$GITHUB_OUTPUT"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "✅ Verified: Safe Renovate update found for PR #$PR_NUMBER (Actor: $ACTOR)"

      - name: Verify All Checks & Mergeability 🕵️‍♂️
        if: steps.guard.outputs.should_run == 'true'
        id: verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.guard.outputs.pr_number }}
        run: |
          # Fetch PR status including mergeability and all check states
          PR_DATA=$(gh pr view "$PR_NUMBER" --json mergeable,statusCheckRollup)
          MERGEABLE=$(echo "$PR_DATA" | jq -r '.mergeable')

          # Check if there are any pending or failing checks in the rollup
          # We look for any state that isn't SUCCESS or NEUTRAL (skipped)
          STILL_RUNNING_OR_FAILED=$(echo "$PR_DATA" | jq -r '.statusCheckRollup[] | select(.state != "SUCCESS" and .state != "NEUTRAL") | .context' | grep -v "Auto-Approve" || true)

          if [ "$MERGEABLE" != "MERGEABLE" ]; then
            echo "❌ PR has merge conflicts. Skipping approval."
            exit 1
          fi

          if [ -n "$STILL_RUNNING_OR_FAILED" ]; then
            echo "⏳ Other checks are still running or failed: $STILL_RUNNING_OR_FAILED"
            exit 1
          fi

          echo "✅ All checks passed and PR is mergeable!"

      - name: Auto-approve PR ✅
        if: steps.verify.conclusion == 'success'
        uses: hmarr/auto-approve-action@f0939ea97e9205ef24d872e76833fa908a770363 # v4.0.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.guard.outputs.pr_number }}
          review-message: '🤖 Smart Auto-Approval: All checks passed & no conflicts! This is a safe update from Renovate. Merging automatically!'
