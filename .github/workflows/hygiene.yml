# =============================================================
# Hygiene: Metadata Validation 🌊
#
# Enforces branch naming and PR title standards.
# Powered by git-hygiene.
# =============================================================

name: Hygiene 🌊

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, edited]

env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: read

jobs:
  hygiene:
    name: Validate Metadata 🔍
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 100 # Needed to see history for commit validation

      - name: Setup Node.js 🟢
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate PR Title 🏷️
        uses: chitranklabs/git-hygiene@22783c72540d66e1b851295d1961c19b6db81856 # v0.4.12
        with:
          command: 'title'
          value: ${{ github.event.pull_request.title }}

      - name: Validate Branch Name 🌿
        uses: chitranklabs/git-hygiene@22783c72540d66e1b851295d1961c19b6db81856 # v0.4.12
        with:
          command: 'branch'
          value: ${{ github.event.pull_request.head.ref }}
