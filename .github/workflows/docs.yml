# =============================================================
# Deploy Documentation
#
# Deploy MkDocs to GitHub Pages on push to main.
#
# Triggers on:
#   - Push to main branch (any file in docs/ or mkdocs.yml)
#   - Manual trigger via Actions tab
#
# Uses pip to install mkdocs-material, builds the site,
# and deploys to the gh-pages branch.
# =============================================================

name: Deploy Documentation 📚

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'CHANGELOG.md'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'CHANGELOG.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy Docs 🚀
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Required for mkdocs-material "Last Updated" feature and git-cliff inclusion
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 🐍
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Install MkDocs Material 🛠️
        run: pip install mkdocs-material

      # Copy CHANGELOG.md into docs/ so MkDocs can include it.
      # The source of truth stays at the root (where git-cliff writes it).
      # docs/changelog.md is never committed - only exists during CI build.
      - name: Copy changelog to docs 📝
        run: cp CHANGELOG.md docs/changelog.md

      # Configure git so mkdocs gh-deploy can push to gh-pages branch.
      - name: Configure git 🔧
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages 🌐
        run: mkdocs gh-deploy --force
