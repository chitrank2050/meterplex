# =============================================================
# Deploy MkDocs to GitHub Pages on push to main.
#
# Triggers on:
#   - Push to main branch (any file in docs/ or mkdocs.yml)
#   - Manual trigger via Actions tab
#
# Uses pip to install mkdocs-material, builds the site,
# and deploys to the gh-pages branch.
# =============================================================

name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'CHANGELOG.md'
  pull_request:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'CHANGELOG.md'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      # Copy CHANGELOG.md into docs/ so MkDocs can include it.
      # The source of truth stays at the root (where git-cliff writes it).
      # docs/changelog.md is never committed - only exists during CI build.
      - name: Copy changelog to docs
        run: cp CHANGELOG.md docs/changelog.md

      # Configure git so mkdocs gh-deploy can push to gh-pages branch.
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        run: mkdocs gh-deploy --force
