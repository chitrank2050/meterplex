# =============================================================
# Semantic Pull Request - Title Validation
#
# Enforces Conventional Commits format on PR titles.
# This ensures that when we squash-merge, the resulting
# commit message is ready for git-cliff.
# =============================================================

name: Semantic Pull Request 🤖

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR Title 🔍
    runs-on: ubuntu-latest
    steps:
      - name: Semantic PR Validation 🚦
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            test
            build
            ci
            revert
          validateSingleCommit: true
          ignoreLabels: |
            bot
            ignore-semantic-pull-request
