# =============================================================
# Semantic Pull Request - Title Validation
#
# Enforces Conventional Commits format on PR titles.
# This ensures that when we squash-merge, the resulting
# commit message is ready for git-cliff.
# =============================================================

name: Semantic Pull Request 🤖

on:
  pull_request:
    types:
      - opened
      - edited
      - synchronize

permissions:
  pull-requests: read

jobs:
  validate:
    name: Validate PR Title 🔍
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Semantic PR Validation 🚦
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Configuration for types allowed
          types: |
            feat
            fix
            chore
            docs
            style
            refactor
            perf
            test
            build
            ci
            revert
          # If the PR contains only one commit, it can be useful to check that the
          # commit message also matches.
          validateSingleCommit: true
          # For squash-merge strategy, the title is the most important part.
          ignoreLabels: |
            bot
            ignore-semantic-pull-request
