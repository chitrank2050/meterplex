# =============================================================
# OpenSSF Scorecard - Security Health Analysis
#
# Scans the repository for security best practices and
# helps identify supply chain security risks.
#
# Results are uploaded to GitHub's Security tab and
# the Scorecard API to provide a public security badge.
# =============================================================

name: OpenSSF Scorecard 🏅

on:
  # For Branch-Protection check. Only the default branch is supported.
  branch_protection_rule:
  # To guarantee Maintained check is occasionally updated. See
  # https://github.com/ossf/scorecard-action#maintaining-a-scorecard-badge
  schedule:
    - cron: '30 15 * * 1'
  push:
    branches: ['main']

# Declare default permissions as none.
permissions: {}

jobs:
  analysis:
    name: Scorecard Analysis 🔍
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      # Needed to upload the results to code-scanning dashboard.
      security-events: write
      # Needed to publish results and get a badge (see publish_results below).
      id-token: write
      # Needed to access the repository.
      contents: read
      # Needed to access actions/workflow runs.
      actions: read

    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository 📥
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Run analysis 🔍
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # (Optional) "repo_token" is only needed if you want to run the
          # "Branch-Protection" check on a private repository.
          # repo_token: ${{ secrets.SCORECARD_TOKEN }}

          # Publish results to OpenSSF Scorecard REST API to get a badge.
          publish_results: true

      # Upload the results as artifacts (optional).
      - name: Upload artifact 📦
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      # Upload the results to GitHub's code scanning dashboard.
      - name: Upload to code-scanning 🚀
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
