# =============================================================
# GitHub Release
#
# Automatically creates a GitHub Release when a version tag
# (v*) is pushed to the repository.
#
# Features:
#   - Generates categorized release notes using git-cliff.
#   - Updates CHANGELOG.md via an automated Pull Request.
#   - Creates a GitHub Release with categorized notes.
#   - Detects prereleases based on tag name (alpha, beta, rc).
# =============================================================

name: GitHub Release 🏷️

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read # Minimum global permission

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Create Automated Release 🚀
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.repository && 'production' }}
      url: https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.tag_name || github.ref_name }}
    permissions:
      contents: write # Needed to create release and update changelog
      pull-requests: write # Needed to create CHANGELOG PR
      id-token: write # Needed for provenance attestations
      attestations: write # Needed for provenance attestations

    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history is required for git-cliff to generate changelogs
          fetch-depth: 0
          persist-credentials: false

      - name: Create Bot Token 🤖🔑
        id: generate_token
        uses: ./.github/actions/setup-bot
        with:
          client-id: ${{ secrets.CHITRANK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CHITRANK_BOT_PRIVATE_KEY }}

      - name: Configure Authenticated Git 🔧
        env:
          TOKEN: ${{ steps.generate_token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${REPO}"

      - name: Generate release notes 📝
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        id: git-cliff
        with:
          config: cliff.toml
          args: --latest --strip all

      - name: Update CHANGELOG.md 📝
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        with:
          config: cliff.toml
          args: --tag ${{ github.event.inputs.tag_name || github.ref_name }} --output CHANGELOG.md

      - name: Create Pull Request for CHANGELOG update 🔀
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate_token.outputs.token }}
          commit-message: 'chore(release): update CHANGELOG.md'
          title: 'chore(release): update CHANGELOG.md for ${{ github.event.inputs.tag_name || github.ref_name }}'
          body: |
            ## What does this PR do?
            Automated changelog update for version ${{ github.event.inputs.tag_name || github.ref_name }}.

            ## Type of change
            - [x] Documentation
            - [x] CI/CD or build configuration

            ## How was this tested?
            - [x] Verified by GitHub Actions Release workflow.

            ## Checklist
            - [x] My code follows the project conventions
            - [x] I have updated documentation if needed
            - [x] `pnpm build` passes
          labels: |
            chore
            release
          branch: 'chore/changelog-${{ github.event.inputs.tag_name || github.ref_name }}'
          base: main
          delete-branch: true
          assignees: chitrank2050
          add-paths: |
            CHANGELOG.md

      - name: Create GitHub Release ✨
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
          TAG_NAME: ${{ github.event.inputs.tag_name || github.ref_name }}
          RELEASE_NOTES: ${{ steps.git-cliff.outputs.content }}
        run: |
          # Detect prerelease based on tag name (contains a hyphen)
          PRERELEASE_FLAG=""
          if [[ "$TAG_NAME" == *"-"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes "$RELEASE_NOTES" \
            $PRERELEASE_FLAG

      - name: Attest Build Provenance 📜
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-name: ${{ github.repository }}
          subject-digest: ${{ github.sha }}
          push-to-registry: false
