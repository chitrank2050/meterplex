# =============================================================
# GitHub Release
#
# Automatically creates a GitHub Release when a version tag
# (v*) is pushed to the repository.
#
# Features:
#   - Generates categorized release notes using git-cliff.
#   - Updates CHANGELOG.md via an automated Pull Request.
#   - Creates a GitHub Release with categorized notes.
#   - Detects prereleases based on tag name (alpha, beta, rc).
# =============================================================

name: GitHub Release 🏷️

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Create Automated Release 🚀
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Full history is required for git-cliff to generate changelogs
          fetch-depth: 0
          persist-credentials: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm 📦
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Generate release notes 📝
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        id: git-cliff
        with:
          config: cliff.toml
          args: --latest --strip all

      - name: Update CHANGELOG.md 📝
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        with:
          config: cliff.toml
          args: --tag ${{ github.event.inputs.tag_name || github.ref_name }} --output CHANGELOG.md

      - name: Create Pull Request for CHANGELOG update 🔀
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(release): update CHANGELOG.md'
          title: 'chore(release): update CHANGELOG.md for ${{ github.event.inputs.tag_name || github.ref_name }}'
          body: |
            ## What does this PR do?
            Automated changelog update for version ${{ github.event.inputs.tag_name || github.ref_name }}.

            ## Type of change
            - [x] Documentation
            - [x] CI/CD or build configuration

            ## How was this tested?
            - [x] Verified by GitHub Actions Release workflow.

            ## Checklist
            - [x] My code follows the project conventions
            - [x] I have updated documentation if needed
            - [x] `pnpm build` passes
          labels: |
            chore
            release
          branch: 'chore/changelog-${{ github.event.inputs.tag_name || github.ref_name }}'
          base: main
          delete-branch: true
          add-paths: |
            CHANGELOG.md

      - name: Create GitHub Release ✨
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body: ${{ steps.git-cliff.outputs.content }}
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          name: ${{ github.event.inputs.tag_name || github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: ${{ contains(github.event.inputs.tag_name || github.ref_name, '-') }}
