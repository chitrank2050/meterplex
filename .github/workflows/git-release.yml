# =============================================================
# GitHub Release
#
# Automatically creates a GitHub Release when a version tag
# (v*) is pushed to the repository.
#
# Architecture:
#   1. Prepare (Instant): Updates CHANGELOG.md and creates a PR.
#   2. Release (Manual Approval): Creates GitHub Release + Attestation.
# =============================================================

name: GitHub Release 🏷️

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to release (e.g. v0.1.0)'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ─── PREPARE JOB ─────────────────────────────────────────────
  # Runs immediately to update documentation.
  prepare:
    name: Prepare Changelog 📝
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create Bot Token 🤖🔑
        id: generate_token
        uses: ./.github/actions/setup-bot
        with:
          client-id: ${{ secrets.CHITRANK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CHITRANK_BOT_PRIVATE_KEY }}

      - name: Configure Authenticated Git 🔧
        env:
          TOKEN: ${{ steps.generate_token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          git remote set-url origin "https://x-access-token:${TOKEN}@github.com/${REPO}"

      - name: Update CHANGELOG.md 📝
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        with:
          config: cliff.toml
          args: --tag ${{ github.event.inputs.tag_name || github.ref_name }} --output CHANGELOG.md

      - name: Create Pull Request for CHANGELOG update 🔀
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate_token.outputs.token }}
          commit-message: 'chore(release): update CHANGELOG.md'
          title: 'chore(release): update CHANGELOG.md for ${{ github.event.inputs.tag_name || github.ref_name }}'
          body: |
            <!-- autofill-start -->
            - chore(release): update CHANGELOG.md
            <!-- autofill-end -->
          labels: |
            chore
            release
          branch: 'chore/changelog-${{ github.event.inputs.tag_name || github.ref_name }}'
          base: main
          delete-branch: true
          assignees: chitrank2050
          add-paths: |
            CHANGELOG.md

      - name: Enable Auto-Merge 🚀
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        run: |
          gh pr merge "$PR_NUMBER" --auto --squash --body "🤖 Auto-Merge enabled: This PR will merge once it's approved and CI passes."

  # ─── RELEASE JOB ─────────────────────────────────────────────
  # Waits for manual approval for the 'production' environment.
  release:
    name: Create Automated Release 🚀
    needs: prepare
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.repository && 'production' }}
      url: https://github.com/${{ github.repository }}/releases/tag/${{ github.event.inputs.tag_name || github.ref_name }}
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create Bot Token 🤖🔑
        id: generate_token
        uses: ./.github/actions/setup-bot
        with:
          client-id: ${{ secrets.CHITRANK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CHITRANK_BOT_PRIVATE_KEY }}

      - name: Generate release notes 📝
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        id: git-cliff
        with:
          config: cliff.toml
          args: --latest --strip all

      - name: Create GitHub Release ✨
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
          TAG_NAME: ${{ github.event.inputs.tag_name || github.ref_name }}
          RELEASE_NOTES: ${{ steps.git-cliff.outputs.content }}
        run: |
          # Detect prerelease based on tag name (contains a hyphen)
          PRERELEASE_FLAG=""
          if [[ "$TAG_NAME" == *"-"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes "$RELEASE_NOTES" \
            $PRERELEASE_FLAG

      - name: Attest Release Artifacts 📜
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: CHANGELOG.md
          push-to-registry: false
