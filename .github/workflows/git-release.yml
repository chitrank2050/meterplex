# =============================================================
# GitHub Release
#
# Automatically creates a GitHub Release when a version tag
# (v*) is pushed to the repository.
#
# Features:
#   - Generates categorized release notes using git-cliff.
#   - Detects prereleases based on tag name (alpha, beta, rc).
# =============================================================

name: GitHub Release 🏷️

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Create Automated Release 🚀
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository 📥
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate release notes 📝
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --latest --strip all

      - name: Create GitHub Release ✨
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.git-cliff.outputs.content }}
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
