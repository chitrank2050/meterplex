# =============================================================
# Weekly Maintenance - Dependency & Overrides Check
#
# This workflow runs every Sunday to proactively check if your
# 'pnpm.overrides' are still necessary.
#
# How it works:
# 1. Removes the 'overrides' block from package.json
# 2. Runs pnpm install and OSV audit
# 3. If everything passes, it automatically opens a Pull Request
#    to remove the redundant overrides for you.
# =============================================================

name: Weekly Maintenance 🧹

on:
  schedule:
    # Run every Sunday at midnight
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pull-requests: write

jobs:
  prune_overrides:
    name: Prune Redundant Overrides ✂️
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm 📦
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5

      - name: Setup Node.js 🟢
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Remove overrides & update lockfile 🛠️
        id: check
        run: |
          # Use jq to remove the overrides block
          jq 'del(.pnpm.overrides)' package.json > package.json.tmp && mv package.json.tmp package.json

          # Refresh lockfile (allow update, use offline cache where possible)
          pnpm install --no-frozen-lockfile --prefer-offline

      - name: Run OSV Scanner 🔍
        run: |
          # Download and run OSV-Scanner binary directly
          curl -L https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner --lockfile=pnpm-lock.yaml

      - name: Create Pull Request if redundant 🚀
        # This step only runs if the scanner succeeded (exit code 0)
        # meaning the overrides are no longer needed!
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(deps): prune redundant dependency overrides'
          branch: maintenance/prune-overrides
          delete-branch: true
          title: '🧹 Prune redundant dependency overrides'
          body: |
            The weekly maintenance check has detected that your `pnpm.overrides` are no longer necessary.

            Upstream packages have been updated and the security vulnerabilities previously mitigated by these overrides are now resolved in the base versions.

            **Action:** Review and merge this PR to keep your `package.json` clean.
          labels: |
            dependencies
            maintenance
            automated-pr
