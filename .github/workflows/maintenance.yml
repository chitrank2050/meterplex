# =============================================================
# Weekly Maintenance - Dependency & Overrides Check
#
# This workflow runs every Sunday to proactively check if your
# 'overrides' in pnpm-workspace.yaml are still necessary.
#
# How it works:
# 1. Iterates through each override in pnpm-workspace.yaml
# 2. Temporarily removes it and runs pnpm install + OSV audit
# 3. If the audit passes, the override is confirmed redundant and removed permanently
# 4. If any overrides were pruned, it automatically opens a Pull Request with the clean workspace configuration.
# =============================================================

name: Weekly Maintenance 🧹

on:
  schedule:
    # Run every Sunday at midnight
    - cron: '0 0 * * 0'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read # Minimum global permission

jobs:
  prune_overrides:
    name: Prune Redundant Overrides ✂️
    if: github.event_name != 'workflow_dispatch' || github.actor == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # Needed to create branch
      pull-requests: write # Needed to create PR
    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Create Bot Token 🤖🔑
        id: generate_token
        uses: ./.github/actions/setup-bot
        with:
          client-id: ${{ secrets.CHITRANK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CHITRANK_BOT_PRIVATE_KEY }}

      - name: Install pnpm 📦
        uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7

      - name: Setup Node.js 🟢
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Prune redundant overrides 🛠️
        id: prune
        run: |
          # Download OSV-Scanner binary
          curl -L https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner

          # Get current list of override keys
          keys=$(yq eval '.overrides | keys | .[]' pnpm-workspace.yaml 2>/dev/null || true)

          if [ -z "$keys" ]; then
            echo "No overrides found to prune."
            rm -f osv-scanner
            exit 0
          fi

          echo "Found overrides to check: $keys"

          for key in $keys; do
            echo "----------------------------------------"
            echo "Testing removal of override: $key"

            # Backup current files
            cp pnpm-workspace.yaml pnpm-workspace.yaml.bak
            cp pnpm-lock.yaml pnpm-lock.yaml.bak

            # Remove this specific override
            yq -i "del(.overrides.\"$key\")" pnpm-workspace.yaml

            # If overrides block is now empty, delete the parent key
            remaining_keys=$(yq eval '.overrides | keys | .[]' pnpm-workspace.yaml 2>/dev/null || true)
            if [ -z "$remaining_keys" ]; then
              yq -i 'del(.overrides)' pnpm-workspace.yaml
            fi

            # Refresh lockfile without this override
            if pnpm install --no-frozen-lockfile --prefer-offline --ignore-scripts; then
              # Audit with OSV-Scanner
              if ./osv-scanner --lockfile=pnpm-lock.yaml > scan.log 2>&1; then
                echo "✅ Override '$key' is redundant and has been pruned!"
                rm -f pnpm-workspace.yaml.bak pnpm-lock.yaml.bak
              else
                echo "❌ Override '$key' is still needed. Restoring..."
                mv pnpm-workspace.yaml.bak pnpm-workspace.yaml
                mv pnpm-lock.yaml.bak pnpm-lock.yaml
              fi
            else
              echo "⚠️ pnpm install failed without '$key'. Restoring..."
              mv pnpm-workspace.yaml.bak pnpm-workspace.yaml
              mv pnpm-lock.yaml.bak pnpm-lock.yaml
            fi
          done

          # Cleanup
          rm -f osv-scanner scan.log

      - name: Create Pull Request if redundant 🚀
        # This step runs and creates a Pull Request if any changes (pruning)
        # were made to the working directory.
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate_token.outputs.token }}
          commit-message: 'chore(deps): prune redundant dependency overrides'
          branch: maintenance/prune-overrides
          delete-branch: true
          assignees: chitrank2050
          title: 'chore(deps): prune redundant dependency overrides 🧹'
          body: |
            The weekly maintenance check has detected redundant `overrides` in your `pnpm-workspace.yaml`.

            These overrides are no longer necessary as upstream packages have been updated and the security vulnerabilities are now resolved in the base versions.

            **Action:** Review and merge this PR to keep your `pnpm-workspace.yaml` clean.
          labels: |
            dependencies
            maintenance
            automated-pr
