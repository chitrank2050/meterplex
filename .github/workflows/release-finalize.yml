# =============================================================
# Release Finalization Workflow
#
# Triggered automatically when a Release PR is merged to main.
#   1. Pushes the verified version tag.
#   2. Builds the project artifacts.
#   3. Creates the GitHub Release with generated notes.
#   4. Generates SLSA Build Provenance (Attestation).
# =============================================================

name: Release 2 - Finalize Tag 🏷️

on:
  pull_request:
    types:
      - closed
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to finalize (e.g. v0.1.0)'
        required: true

permissions: read-all

env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  finalize:
    name: Finalize Release 🚀
    if: |
      (github.event_name == 'pull_request' &&
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'release')) ||
      (github.event_name == 'workflow_dispatch' && github.actor == github.repository_owner)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Create Bot Token 🤖🔑
        id: generate_token
        uses: ./.github/actions/setup-bot
        with:
          client-id: ${{ secrets.CHITRANK_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CHITRANK_BOT_PRIVATE_KEY }}

      - name: Extract Tag Name 🏷️
        id: vars
        env:
          BRANCH_NAME: ${{ github.event.pull_request.head.ref }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          RAW_INPUT="${INPUT_VERSION:-$BRANCH_NAME}"
          # Robust extraction: find the first version-like string (X.Y.Z) in the input
          TAG_NAME=$(echo "$RAW_INPUT" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+(-.*)?' | head -1)

          if [ -z "$TAG_NAME" ]; then
            echo "❌ Error: Could not extract valid version from '$RAW_INPUT'"
            exit 1
          fi

          # Ensure it has the 'v' prefix
          if [[ ! "$TAG_NAME" =~ ^v ]]; then TAG_NAME="v$TAG_NAME"; fi

          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Finalized tag: $TAG_NAME"

      - name: Push Verified Tag 🏷️
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
          TAG_NAME: ${{ steps.vars.outputs.tag_name }}
        run: |
          git config user.name "chitrank-actions[bot]"
          git config user.email "actions@github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git tag "$TAG_NAME" && git push origin "$TAG_NAME" || echo "Tag push failed, continuing..."

      - name: Setup Environment 🛠️
        uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7

      - name: Setup Node.js 🟢
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies 📥
        timeout-minutes: 5
        run: pnpm install --frozen-lockfile --prefer-offline --ignore-scripts

      - name: Build Project 🏗️
        run: pnpm run build

      - name: Generate release notes 📝
        uses: orhun/git-cliff-action@f50e11560dce63f7c33227798f90b924471a88b5 # v4.8.0
        id: git-cliff
        with:
          config: cliff.toml
          args: --latest --strip all
        env:
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}

      - name: Create GitHub Release ✨
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
          TAG_NAME: ${{ steps.vars.outputs.tag_name }}
          RELEASE_NOTES: ${{ steps.git-cliff.outputs.content }}
        run: |
          # Detect prerelease based on tag name (contains a hyphen)
          PRERELEASE_FLAG=""
          if [[ "$TAG_NAME" == *"-"* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi

          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes "$RELEASE_NOTES" \
            $PRERELEASE_FLAG

      - name: Attest Build Artifacts 📜
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/**
            CHANGELOG.md
          push-to-registry: false
