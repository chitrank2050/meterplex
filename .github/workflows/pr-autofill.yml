# =============================================================
# Automated PR Description (Autofill)
#
# Automatically populates the Pull Request description with a
# summarized changelog of all commits in the branch.
#
# This ensures that every PR has a professional, categorized
# description without any manual effort from the developer.
# =============================================================

name: PR Description Autofill ✍️

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  autofill:
    name: Generate Description 📝
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login != 'renovate[bot]'
    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout repository 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0 # Required to get commit history
          persist-credentials: false

      - name: Generate Changelog Summary 📝
        id: changelog
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # 1. Get the list of commits
          COMMITS=$(git log origin/"$BASE_REF"..origin/"$HEAD_REF" --pretty=format:"- %s")

          # 2. Get the CURRENT PR body from GitHub
          CURRENT_BODY=$(gh pr view "$PR_NUMBER" --json body --template '{{.body}}')

          # 3. If the body is empty or doesn't have our tags, use the template
          if [[ ! "$CURRENT_BODY" == *"<!-- autofill-start -->"* ]]; then
            echo "No tags found, using base template..."
            CURRENT_BODY=$(cat .github/PULL_REQUEST_TEMPLATE.md)
          fi

          # 4. Perform a surgical replacement of the content between tags
          # We use a temp file to handle multiline safely
          echo "$CURRENT_BODY" > final_body.md

          # Delete everything between tags
          sed -i '/<!-- autofill-start -->/,/<!-- autofill-end -->/{//!d}' final_body.md

          # Insert the new commits after the start tag
          sed -i "/<!-- autofill-start -->/r /dev/stdin" final_body.md <<EOF
          $COMMITS
          EOF

      - name: Update PR 🚀
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --body-file final_body.md \
            --add-assignee "chitrank2050"
