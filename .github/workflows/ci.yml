# =============================================================
# CI & Security Analysis
#
# Primary pipeline for code quality and security.
# Triggers on:
#   - Push to main (excluding docs/meta)
#   - Pull Requests to main
#
# Jobs:
#   - Lint & Hygiene: ESLint, Prettier, Knip
#   - Build & Test: Vitest + Coverage
#   - OSV Audit: Google OSV dependency scan
#   - Secret Scan: Gitleaks history scan
# =============================================================

name: CI & Security Analysis ⚡️

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'assets/**'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/FUNDING.yml'
      - '.github/CODEOWNERS'
      - 'bruno/**'
      - '.vscode/**'
      - '.editorconfig'
      - '.env.example'
      - '.gitleaks.toml'
      - 'renovate.json'
      - 'cliff.toml'
      - 'commitlint.config.mjs'
      - 'lefthook.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'assets/**'
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/FUNDING.yml'
      - '.github/CODEOWNERS'
      - 'bruno/**'
      - '.vscode/**'
      - '.editorconfig'
      - '.env.example'
      - '.gitleaks.toml'
      - 'renovate.json'
      - 'cliff.toml'
      - 'commitlint.config.mjs'
      - 'lefthook.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: 24

jobs:
  # ─── LINTING JOB ─────────────────────────────────────────────
  lint:
    name: Lint & Hygiene 🧹
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 📥
        uses: actions/checkout@v6

      - name: Install pnpm 📦
        uses: pnpm/action-setup@v5

      - name: Setup Node.js 🟢
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies 🛠️
        run: pnpm install --frozen-lockfile

      - name: Check formatting ✨
        run: pnpm format:check

      - name: Lint code 🔍
        run: pnpm lint

      - name: Dead code check (Knip) ✂️
        run: pnpm lint:knip

  # ─── TESTING JOB ─────────────────────────────────────────────
  test:
    name: Build & Test 🧪
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 📥
        uses: actions/checkout@v6

      - name: Install pnpm 📦
        uses: pnpm/action-setup@v5

      - name: Setup Node.js 🟢
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies 🛠️
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client 💎
        run: pnpm db:generate

      - name: Build application 🏗️
        run: pnpm build

      - name: Run unit tests 🧪
        id: run_tests
        run: |
          if [ -d "src" ] && find src -name "*.spec.ts" | grep -q "."; then
            pnpm test:cov
            echo "tests_ran=true" >> "$GITHUB_OUTPUT"
          else
            echo "No unit tests found, skipping."
            echo "tests_ran=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload coverage to Codecov 📊
        if: steps.run_tests.outputs.tests_ran == 'true'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ─── SECURITY JOBS ───────────────────────────────────────────
  security_audit:
    name: OSV Audit 🛡️
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 📥
        uses: actions/checkout@v6
      - name: Run OSV Scanner 🔍
        run: |
          curl -L https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner --lockfile=pnpm-lock.yaml

  secret_scan:
    name: Secret Scan 🔑
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 📥
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run Gitleaks 🕵️
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
