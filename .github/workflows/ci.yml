# =============================================================
# CI Pipeline — Runs on every push and pull request.
#
# Jobs:
#   1. Lint & Format — ESLint + Prettier check (no auto-fix, just verify)
#   2. Build — TypeScript compilation (catches type errors)
#   3. Test — Unit tests (commented out until we write tests in Phase 1)
#
# If any job fails, the PR gets a red X. No merging broken code.
# =============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      # Check formatting — fails if any file isn't formatted.
      # Developers must run `pnpm format` locally before pushing.
      - name: Check formatting
        run: pnpm prettier --check "src/**/*.ts" "test/**/*.ts"

      # Lint — fails on any ESLint error.
      # Warnings are allowed (they don't block CI).
      - name: Lint
        run: pnpm lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      # TypeScript compilation — catches type errors that slip past the editor.
      # If this fails, there's a type error somewhere in the codebase.
      - name: Build
        run: pnpm build

