# =============================================================
# CI & Security Analysis
#
# Primary pipeline for code quality and security.
# Triggers on:
#   - Push to main (excluding docs/meta)
#   - Pull Requests to main
#
# Jobs are optimized to run only when relevant files change
# to save GitHub Actions minutes (Free Tier friendly).
# =============================================================

name: CI & Security Analysis ⚡️

on:
  push:
    branches: [main]
    paths-ignore:
      # Documentation
      - 'docs/**'
      - 'mkdocs.yml'
      - 'assets/**'
      # Markdown (community health & repo meta)
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/FUNDING.yml'
      - '.github/CODEOWNERS'
      # API client collections
      - 'bruno/**'
      # Editor & IDE configs
      - '.vscode/**'
      - '.editorconfig'
      # Environment examples & secrets config
      - '.env.example'
      - '.gitleaks.toml'
      # Dependency management (Renovate handles PRs; not build-relevant)
      - 'renovate.json'
      # Changelog & release tooling config
      - 'cliff.toml'
      # Git hooks config (local-only)
      - 'commitlint.config.mjs'
      - 'lefthook.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      # Documentation
      - 'docs/**'
      - 'mkdocs.yml'
      - 'assets/**'
      # Markdown (community health & repo meta)
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/FUNDING.yml'
      - '.github/CODEOWNERS'
      # API client collections
      - 'bruno/**'
      # Editor & IDE configs
      - '.vscode/**'
      - '.editorconfig'
      # Environment examples & secrets config
      - '.env.example'
      - '.gitleaks.toml'
      # Dependency management (Renovate handles PRs; not build-relevant)
      - 'renovate.json'
      # Changelog & release tooling config
      - 'cliff.toml'
      # Git hooks config (local-only)
      - 'commitlint.config.mjs'
      - 'lefthook.yml'

concurrency:
  # Ensure only one CI run per branch/PR at a time
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── CHANGE DETECTION ────────────────────────────────────────
  # Determines which jobs actually need to run based on changed files.
  changes:
    name: Detect Changes 🔍
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      deps: ${{ steps.filter.outputs.deps }}
      lint: ${{ steps.filter.outputs.lint }}
    steps:
      - name: Checkout 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'test/**'
              - 'prisma/**'
              - 'vitest.config.ts'
            deps:
              - 'pnpm-lock.yaml'
              - 'package.json'
            lint:
              - '.eslintrc.js'
              - '.eslintignore'
              - 'tsconfig.json'
              - 'knip.json'

  # ─── LINTING JOB ─────────────────────────────────────────────
  lint:
    name: Lint & Hygiene 🧹
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.lint == 'true' || needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm 📦
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v5

      - name: Setup Node.js 🟢
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies 🛠️
        run: pnpm install --frozen-lockfile

      - name: Check formatting ✨
        run: pnpm format:check

      - name: Lint code 🔍
        run: pnpm lint:ts

      - name: Lint Markdown 📝
        run: pnpm lint:md

      # - name: Dead code check (Knip) ✂️
      #   run: pnpm lint:knip

  # ─── TESTING JOB ─────────────────────────────────────────────
  test:
    name: Build & Test 🧪
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm 📦
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v5

      - name: Setup Node.js 🟢
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies 🛠️
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client 💎
        run: pnpm db:generate

      - name: Build application 🏗️
        run: pnpm build

      - name: Run unit tests 🧪
        id: run_tests
        run: |
          if [ -d "src" ] && find src -name "*.spec.ts" | grep -q "."; then
            pnpm test:cov
            echo "tests_ran=true" >> "$GITHUB_OUTPUT"
          else
            echo "No unit tests found, skipping."
            echo "tests_ran=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload coverage to Codecov 📊
        if: steps.run_tests.outputs.tests_ran == 'true'
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5.5.4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  # ─── SECURITY JOBS ───────────────────────────────────────────
  security_audit:
    name: OSV Audit 🛡️
    needs: changes
    if: needs.changes.outputs.deps == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run OSV Scanner 🔍
        run: |
          # Download and run OSV-Scanner binary directly
          curl -L https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner --lockfile=pnpm-lock.yaml

  secret_scan:
    name: Secret Scan 🔑
    runs-on: ubuntu-latest
    # Secret scan always runs if any non-ignored file changes
    steps:
      - name: Checkout 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Run Gitleaks 🕵️
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
