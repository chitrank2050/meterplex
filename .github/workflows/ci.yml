# =============================================================
# CI & Security Analysis
#
# Primary pipeline for code quality and security.
# Triggers on:
#   - Push to main (excluding docs/meta)
#   - Pull Requests to main
#
# Jobs are optimized to run only when relevant files change
# to save GitHub Actions minutes (Free Tier friendly).
# =============================================================

name: CI & Security Analysis ⚡️

on:
  push:
    branches: [main]
    paths-ignore:
      # Documentation
      - 'docs/**'
      - 'mkdocs.yml'
      - 'assets/**'
      # Markdown (community health & repo meta)
      - '*.md'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/PULL_REQUEST_TEMPLATE.md'
      - '.github/FUNDING.yml'
      - '.github/CODEOWNERS'
      # API client collections
      - 'bruno/**'
      # Editor & IDE configs
      - '.vscode/**'
      - '.editorconfig'
      # Environment examples & secrets config
      - '.env.example'
      - '.gitleaks.toml'
      # Dependency management (Renovate handles PRs; not build-relevant)
      - 'renovate.json'
      # Changelog & release tooling config
      - 'cliff.toml'
      # Git hooks config (local-only)
      - 'commitlint.config.mjs'
      - 'lefthook.yml'
  pull_request:
    branches: [main]

concurrency:
  # Ensure only one CI run per branch/PR at a time
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: 24
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── CHANGE DETECTION ────────────────────────────────────────
  # Determines which jobs actually need to run based on changed files.
  changes:
    name: Detect Changes 🔍
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      deps: ${{ steps.filter.outputs.deps }}
      lint: ${{ steps.filter.outputs.lint }}
      workflows: ${{ steps.filter.outputs.workflows }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            src:
              - 'src/**'
              - 'test/**'
              - 'prisma/**'
              - 'vitest.config.ts'
            deps:
              - 'pnpm-lock.yaml'
              - 'package.json'
            lint:
              - '.eslintrc.js'
              - '.eslintignore'
              - 'tsconfig.json'
              - 'knip.json'
            workflows:
              - '.github/workflows/**'
              - '.github/actions/**'
            docs:
              - 'docs/**'
              - '*.md'

  # ─── HYGIENE & SECURITY ───────────────────────────────────────
  # Combined into one job to save runner overhead (VM startup + pnpm install).
  hygiene:
    name: Hygiene & Security 🧼🛡️
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.lint == 'true' || needs.changes.outputs.deps == 'true' || needs.changes.outputs.workflows == 'true' || needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm 📦
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Setup Node.js 🟢
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies 🛠️
        run: pnpm install --frozen-lockfile

      - name: Cache Prisma Client 💎
        id: cache-prisma
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules/.prisma
          key: ${{ runner.os }}-prisma-${{ hashFiles('prisma/schema.prisma') }}

      - name: Validate & Generate Prisma Client 💎
        if: steps.cache-prisma.outputs.cache-hit != 'true'
        run: |
          npx prisma validate
          pnpm db:generate

      - name: Hygiene & Security Checks 🧪🛡️
        run: |
          # Run independent tasks in parallel
          pnpm lint:ts & pid1=$!
          pnpm format:check & pid2=$!
          pnpm lint:md & pid3=$!
          # pnpm lint:knip & pid4=$!

          # Run OSV Audit (also independent)
          curl -L https://github.com/google/osv-scanner/releases/download/v2.3.5/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner --lockfile=pnpm-lock.yaml & pid4=$!

          # Wait for all background processes and capture exit codes
          wait $pid1 && wait $pid2 && wait $pid3 && wait $pid4

  # ─── TESTING JOB ─────────────────────────────────────────────
  test:
    name: Build & Test 🧪
    needs: changes
    if: needs.changes.outputs.src == 'true' || needs.changes.outputs.deps == 'true' || needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install pnpm 📦
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Setup Node.js 🟢
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies 🛠️
        run: pnpm install --frozen-lockfile

      - name: Cache Prisma Client 💎
        id: cache-prisma
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: node_modules/.prisma
          key: ${{ runner.os }}-prisma-${{ hashFiles('prisma/schema.prisma') }}

      - name: Validate & Generate Prisma client 💎
        if: steps.cache-prisma.outputs.cache-hit != 'true'
        run: |
          npx prisma validate
          pnpm db:generate

      - name: Build application 🏗️
        run: pnpm build

      - name: Run unit tests 🧪
        id: run_tests
        run: |
          if [ -d "src" ] && find src -name "*.spec.ts" | grep -q "."; then
            pnpm test:cov
            echo "tests_ran=true" >> "$GITHUB_OUTPUT"
          else
            echo "No unit tests found, skipping."
            echo "tests_ran=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload coverage to Codecov 📊
        if: steps.run_tests.outputs.tests_ran == 'true'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false

  secret_scan:
    name: Secret Scan 🔑
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner 🛡️
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout 📥
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Only fetch enough history for an incremental scan
          fetch-depth: 0
          persist-credentials: false
      - name: Run Gitleaks 🕵️
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
