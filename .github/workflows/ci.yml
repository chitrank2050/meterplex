name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.vscode/**'
      - '.env.example'
      - 'mkdocs.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.vscode/**'
      - '.env.example'
      - 'mkdocs.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build_and_test:
    name: Build and Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Check formatting
        run: pnpm prettier --check "**/*.{ts,json,md,yml,yaml}"

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      # Unit tests (run only if there are spec files)
      - name: Run tests
        run: |
          if [ -d "src" ] && find src -name "*.spec.ts" | grep -q "."; then
            pnpm test
          else
            echo "No unit tests found, skipping."
          fi

      # E2E tests (uncomment and configure when ready)
      # - name: Run e2e tests
      #   run: pnpm test:e2e
