# Labeler Configuration (v5 Syntax)
# -------------------------------------------------------------
# Keys represent the label names in GitHub.
# Values represent the file patterns to match.

'area/docs':
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - '*.md'

'area/ci':
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/actions/**'
          - 'lefthook.yml'

'area/logic':
  - changed-files:
      - any-glob-to-any-file:
          - 'src/**'
          - 'apps/**'
          - 'libs/**'

'area/deps':
  - changed-files:
      - any-glob-to-any-file:
          - 'package.json'
          - 'pnpm-lock.yaml'

'area/security':
  - changed-files:
      - any-glob-to-any-file:
          - 'SECURITY.md'
          - '.github/workflows/scorecard.yml'
          - '.github/workflows/workflow-lint.yml'
