# Labeler Configuration (v5 Syntax)
# -------------------------------------------------------------
# Keys represent the label names in GitHub.
# Values represent the file patterns to match.

'area/docs':
  - changed-files:
      - any-glob-to-any-file:
          - 'docs/**'
          - '*.md'

'area/ci':
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - '.github/actions/**'
          - 'lefthook.yml'

'area/logic':
  - changed-files:
      - any-glob-to-any-file:
          - 'src/**'

'area/database':
  - changed-files:
      - any-glob-to-any-file:
          - 'prisma/**'

'area/api':
  - changed-files:
      - any-glob-to-any-file:
          - 'bruno/**'

'area/deps':
  - changed-files:
      - any-glob-to-any-file:
          - 'package.json'
          - 'pnpm-lock.yaml'
          - 'pnpm-workspace.yaml'

'area/security':
  - changed-files:
      - any-glob-to-any-file:
          - 'SECURITY.md'
          - '.gitleaks.toml'
          - '.github/workflows/scorecard.yml'
          - '.github/workflows/workflow-lint.yml'

'area/maintenance':
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/maintenance.yml'
          - '.github/workflows/auto-approve.yml'
  - branch:
      - '^maintenance/.*'
