# Lefthook - Git hooks manager
# Replaces Husky + lint-staged.
# Docs: https://lefthook.dev/configuration/

# ─── pre-commit ──────────────────────────────────────────────
# Runs in sequence: secrets scan first, then per-file linting.
pre-commit:
  parallel: false
  commands:
    # 1. Block commits that contain secrets/credentials
    secrets:
      run: gitleaks protect --staged --redact -v

    # 2. TypeScript files - ESLint fix + Prettier format
    lint-ts:
      glob: '**/*.ts'
      run: pnpm exec eslint --fix {staged_files} && pnpm exec prettier --write {staged_files}
      stage_fixed: true

    # 3. Markdown files - markdownlint fix + Prettier format
    lint-md:
      glob: '**/*.md'
      run: pnpm exec markdownlint --fix {staged_files} && pnpm exec prettier --write {staged_files}
      stage_fixed: true

    # 4. JSON / YAML - Prettier format only
    lint-json-yml:
      glob: '**/*.{json,yml,yaml}'
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

    # 5. GitHub Actions - Security linting (zizmor)
    lint-actions:
      glob: '.github/workflows/*.yml'
      run: if command -v zizmor > /dev/null; then zizmor {staged_files}; else echo "zizmor not found, skipping actions lint. Install with 'brew install zizmor'"; fi

# ─── commit-msg ──────────────────────────────────────────────
# Enforces Conventional Commits format via git-hygiene.
commit-msg:
  commands:
    # Enforce Conventional Commits via git-hygiene
    git-hygiene:
      run: npx git-hygiene commit {1}

# ─── pre-push ────────────────────────────────────────────────
# Runs unit tests before any push reaches the remote.
pre-push:
  parallel: true
  commands:
    tests:
      run: pnpm test --passWithNoTests

    # Ensure branch naming follows standards
    branch-name:
      run: npx git-hygiene branch

    # Scan for dependency vulnerabilities
    audit:
      run: if command -v osv-scanner > /dev/null; then osv-scanner --lockfile pnpm-lock.yaml; else echo "osv-scanner not found, skipping audit. Install with 'brew install osv-scanner'"; fi
